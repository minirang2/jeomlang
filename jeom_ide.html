<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>점 (Jeom) — 웹 IDE</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=JetBrains+Mono:wght@300;400;600&display=swap");
            :root {
                --bg: #080a0f;
                --bg2: #0d1117;
                --bg3: #111720;
                --panel: #131b25;
                --border: #1e2d40;
                --border2: #243547;
                --dot: #00e5ff;
                --dot2: #0099cc;
                --accent: #ff6b35;
                --green: #39ff14;
                --yellow: #ffd700;
                --red: #ff3333;
                --text: #c8d8e8;
                --text2: #7a9bb5;
                --text3: #3d5a70;
                --glow: 0 0 8px #00e5ff88, 0 0 20px #00e5ff33;
                --mono: "JetBrains Mono", monospace;
                --ui: "Noto Sans KR", sans-serif;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: var(--ui);
                overflow: hidden;
            }
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: radial-gradient(circle at 1px 1px, #00e5ff08 1px, transparent 0);
                background-size: 28px 28px;
                pointer-events: none;
                z-index: 0;
            }
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 80% 60% at 50% 0%, #00e5ff06 0%, transparent 60%);
                pointer-events: none;
                z-index: 0;
            }
            header {
                position: relative;
                z-index: 10;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 16px;
                height: 52px;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                gap: 10px;
            }
            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .logo img {
                width: 32px;
                height: 32px;
                border-radius: 8px;
            }
            .logo-text {
                font-family: var(--mono);
                font-size: 17px;
                font-weight: 700;
                color: var(--dot);
                letter-spacing: 2px;
                text-shadow: var(--glow);
            }
            .logo-sub {
                font-size: 10px;
                color: var(--text3);
                letter-spacing: 3px;
                text-transform: uppercase;
                margin-top: 1px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-left: auto;
            }
            .badge {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
                background: var(--border);
                border: 1px solid var(--border2);
                border-radius: 3px;
                padding: 2px 6px;
                letter-spacing: 1px;
            }
            .workspace {
                position: relative;
                z-index: 1;
                display: grid;
                grid-template-columns: 200px 1fr 320px;
                height: calc(100vh - 52px);
            }
            .sidebar {
                background: var(--panel);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .sidebar-title {
                padding: 10px 12px 7px;
                font-size: 9px;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--text3);
                border-bottom: 1px solid var(--border);
                font-family: var(--mono);
            }
            .ref-list {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
            }
            .ref-list::-webkit-scrollbar {
                width: 3px;
            }
            .ref-list::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 2px;
            }
            .ref-section {
                padding: 7px 12px 3px;
                font-size: 9px;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: var(--dot2);
                font-family: var(--mono);
            }
            .ref-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 3px 12px;
                cursor: pointer;
                transition: background 0.1s;
            }
            .ref-item:hover {
                background: var(--border);
            }
            .ref-item:hover .ref-tok {
                color: var(--dot);
                text-shadow: var(--glow);
            }
            .ref-tok {
                font-family: var(--mono);
                font-size: 13px;
                color: var(--dot2);
                transition: color 0.15s;
                user-select: none;
            }
            .ref-name {
                font-family: var(--mono);
                font-size: 9px;
                color: var(--text3);
            }
            .editor-area {
                display: flex;
                flex-direction: column;
                background: var(--bg2);
                min-width: 0;
            }
            .editor-toolbar {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 7px 12px;
                background: var(--panel);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                flex-wrap: wrap;
            }
            .btn {
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 5px 12px;
                border: 1px solid var(--border2);
                border-radius: 4px;
                background: var(--bg3);
                color: var(--text);
                font-family: var(--mono);
                font-size: 11px;
                cursor: pointer;
                transition: all 0.15s;
                letter-spacing: 0.3px;
                white-space: nowrap;
            }
            .btn:hover {
                border-color: var(--dot);
                color: var(--dot);
                background: #00e5ff0a;
                box-shadow: var(--glow);
            }
            .btn.primary {
                background: linear-gradient(135deg, #00384d, #00263a);
                border-color: var(--dot2);
                color: var(--dot);
            }
            .btn.primary:hover {
                background: linear-gradient(135deg, #004d6a, #003350);
                box-shadow: var(--glow);
            }
            .btn.danger {
                border-color: #ff333344;
                color: #ff6666;
            }
            .btn.danger:hover {
                border-color: var(--red);
                color: var(--red);
                background: #ff00001a;
            }
            .btn-icon {
                font-size: 14px;
                line-height: 1;
            }
            .sep {
                width: 1px;
                height: 18px;
                background: var(--border);
                margin: 0 1px;
            }
            .fn-input {
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text2);
                font-family: var(--mono);
                font-size: 11px;
                padding: 4px 9px;
                width: 130px;
                outline: none;
                transition: border-color 0.15s;
            }
            .fn-input:focus {
                border-color: var(--dot2);
                color: var(--text);
            }
            .ml-auto {
                margin-left: auto;
            }
            .ex-bar {
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 5px 12px;
                background: var(--bg3);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                overflow-x: auto;
            }
            .ex-bar::-webkit-scrollbar {
                height: 2px;
            }
            .ex-bar::-webkit-scrollbar-thumb {
                background: var(--border2);
            }
            .ex-label {
                font-size: 9px;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: var(--text3);
                font-family: var(--mono);
                white-space: nowrap;
                flex-shrink: 0;
            }
            .ex-btn {
                padding: 3px 9px;
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: 3px;
                color: var(--text2);
                font-family: var(--mono);
                font-size: 10px;
                cursor: pointer;
                transition: all 0.12s;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .ex-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
                background: #ff6b3508;
            }
            .editor-wrap {
                flex: 1;
                display: flex;
                overflow: hidden;
                position: relative;
            }
            .line-nums {
                background: var(--bg2);
                border-right: 1px solid var(--border);
                padding: 14px 0;
                min-width: 42px;
                text-align: right;
                font-family: var(--mono);
                font-size: 13px;
                line-height: 1.7;
                color: var(--text3);
                overflow: hidden;
                user-select: none;
                flex-shrink: 0;
            }
            .line-nums span {
                display: block;
                padding: 0 8px 0 4px;
            }
            #editor {
                flex: 1;
                background: var(--bg2);
                color: var(--text);
                font-family: var(--mono);
                font-size: 14px;
                line-height: 1.7;
                padding: 14px 16px;
                border: none;
                outline: none;
                resize: none;
                tab-size: 2;
                caret-color: var(--dot);
                overflow-y: auto;
                white-space: pre;
                overflow-x: auto;
            }
            #editor::selection {
                background: #00e5ff22;
            }
            #editor::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            #editor::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 3px;
            }
            .statusbar {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 3px 12px;
                background: var(--panel);
                border-top: 1px solid var(--border);
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
                flex-shrink: 0;
            }
            .s-item {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .s-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--text3);
            }
            .s-dot.ok {
                background: var(--green);
                box-shadow: 0 0 6px var(--green);
            }
            .s-dot.err {
                background: var(--red);
                box-shadow: 0 0 6px var(--red);
            }
            .s-dot.run {
                background: var(--yellow);
                box-shadow: 0 0 6px var(--yellow);
                animation: blink 0.5s step-end infinite;
            }
            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }
            .out-panel {
                display: flex;
                flex-direction: column;
                background: var(--panel);
                border-left: 1px solid var(--border);
            }
            .tabs {
                display: flex;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .tab {
                padding: 9px 14px;
                font-family: var(--mono);
                font-size: 10px;
                letter-spacing: 1px;
                color: var(--text3);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                transition: all 0.15s;
                text-transform: uppercase;
            }
            .tab.active {
                color: var(--dot);
                border-bottom-color: var(--dot);
                background: #00e5ff08;
            }
            .tab:hover:not(.active) {
                color: var(--text2);
            }
            .panel-body {
                flex: 1;
                overflow: hidden;
                position: relative;
            }
            .pview {
                position: absolute;
                inset: 0;
                overflow-y: auto;
                display: none;
            }
            .pview.active {
                display: block;
            }
            .pview::-webkit-scrollbar {
                width: 4px;
            }
            .pview::-webkit-scrollbar-thumb {
                background: var(--border2);
                border-radius: 2px;
            }
            #output {
                font-family: var(--mono);
                font-size: 12.5px;
                line-height: 1.65;
                padding: 12px 14px;
                white-space: pre-wrap;
                word-break: break-all;
            }
            .o-out {
                color: var(--text);
            }
            .o-err {
                color: var(--red);
                opacity: 0.85;
            }
            .o-info {
                color: var(--dot2);
            }
            .o-ok {
                color: var(--green);
            }
            .o-fail {
                color: var(--red);
            }
            .enc-wrap {
                padding: 14px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .enc-box {
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 12px;
            }
            .enc-lbl {
                font-size: 9px;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: var(--text3);
                font-family: var(--mono);
                margin-bottom: 7px;
            }
            .enc-in {
                width: 100%;
                background: var(--bg2);
                border: 1px solid var(--border2);
                border-radius: 4px;
                color: var(--text);
                font-family: var(--mono);
                font-size: 12px;
                padding: 6px 9px;
                outline: none;
                transition: border-color 0.15s;
            }
            .enc-in:focus {
                border-color: var(--dot2);
            }
            .enc-res {
                margin-top: 7px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 7px 9px;
                font-family: var(--mono);
                font-size: 11px;
                color: var(--dot);
                word-break: break-all;
                min-height: 34px;
                cursor: pointer;
                transition: border-color 0.15s;
            }
            .enc-res:hover {
                border-color: var(--dot2);
            }
            .enc-hint {
                font-size: 9px;
                color: var(--text3);
                margin-top: 3px;
                font-family: var(--mono);
            }
            .tok-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px;
                padding: 10px;
            }
            .tok-card {
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 6px 9px;
                cursor: pointer;
                transition: all 0.12s;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 4px;
            }
            .tok-card:hover {
                border-color: var(--dot);
                background: #00e5ff08;
            }
            .tok-card:hover .tc-sym {
                color: var(--dot);
                text-shadow: var(--glow);
            }
            .tc-sym {
                font-family: var(--mono);
                font-size: 14px;
                color: var(--dot2);
                flex-shrink: 0;
            }
            .tc-name {
                font-family: var(--mono);
                font-size: 8.5px;
                color: var(--text3);
                text-align: right;
            }
            .overlay {
                position: fixed;
                inset: 0;
                background: #000a;
                z-index: 500;
                display: none;
                align-items: center;
                justify-content: center;
            }
            .overlay.show {
                display: flex;
            }
            .ov-box {
                background: var(--panel);
                border: 1px solid var(--dot2);
                border-radius: 8px;
                padding: 22px 26px;
                min-width: 320px;
                box-shadow: var(--glow);
            }
            .ov-box h3 {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--dot);
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 11px;
            }
            .ov-box input {
                width: 100%;
                background: var(--bg2);
                border: 1px solid var(--border2);
                border-radius: 4px;
                color: var(--text);
                font-family: var(--mono);
                font-size: 14px;
                padding: 8px 11px;
                outline: none;
                margin-bottom: 11px;
            }
            .ov-box input:focus {
                border-color: var(--dot);
            }
            .toast {
                position: fixed;
                bottom: 22px;
                right: 22px;
                background: var(--panel);
                border: 1px solid var(--dot2);
                border-radius: 5px;
                padding: 9px 16px;
                font-family: var(--mono);
                font-size: 12px;
                color: var(--dot);
                z-index: 999;
                opacity: 0;
                transform: translateY(8px);
                transition: all 0.2s;
                pointer-events: none;
                box-shadow: var(--glow);
            }
            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }
            @media (max-width: 900px) {
                .workspace {
                    grid-template-columns: 1fr;
                    grid-template-rows: 1fr auto;
                }
                .sidebar {
                    display: none;
                }
                .out-panel {
                    height: 38vh;
                    border-left: none;
                    border-top: 1px solid var(--border);
                }
                .editor-area {
                    height: calc(62vh - 52px);
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <img src="logo_animated.svg" alt="Jeom" title="점(Jeom) Language" />
                <div>
                    <div class="logo-text">점 · JEOM</div>
                    <div class="logo-sub">Dot Language IDE</div>
                </div>
            </div>
            <div class="header-right">
                <span class="badge">v1.1.0</span>
                <span class="badge">WebVM</span>
            </div>
        </header>

        <div class="workspace">
            <div class="sidebar">
                <div class="sidebar-title">· 명령 참조</div>
                <div class="ref-list" id="refList"></div>
            </div>

            <div class="editor-area">
                <div class="editor-toolbar">
                    <input class="fn-input" id="filename" value="main.jeom" spellcheck="false" />
                    <div class="sep"></div>
                    <button class="btn primary" onclick="runCode()" title="Ctrl+Enter / F5">
                        <span class="btn-icon">●</span> 실행
                    </button>
                    <button class="btn" onclick="checkCode()"><span class="btn-icon">∘</span> 검사</button>
                    <div class="sep"></div>
                    <button class="btn" onclick="downloadCode()"><span class="btn-icon">⸳</span> 저장</button>
                    <button class="btn" onclick="document.getElementById('fi').click()">
                        <span class="btn-icon">◦</span> 열기
                    </button>
                    <input type="file" id="fi" accept=".jeom,.txt" style="display: none" onchange="openFile(event)" />
                    <div class="ml-auto">
                        <button class="btn danger" onclick="clearOutput()">
                            <span class="btn-icon">‥</span> 지우기
                        </button>
                    </div>
                </div>
                <div class="ex-bar">
                    <span class="ex-label">예제 ·</span>
                    <button class="ex-btn" onclick="loadEx('hello')">● Hello</button>
                    <button class="ex-btn" onclick="loadEx('vars')">∘ 변수·연산</button>
                    <button class="ex-btn" onclick="loadEx('func')">˙ 함수</button>
                    <button class="ex-btn" onclick="loadEx('loop')">‥ 반복문</button>
                    <button class="ex-btn" onclick="loadEx('array')">◦ 배열</button>
                    <button class="ex-btn" onclick="loadEx('trycatch')">‥· 오류처리</button>
                    <button class="ex-btn" onclick="loadEx('input')">·˙ 입력</button>
                    <button class="ex-btn" onclick="loadEx('dict')">◦‧ 딕셔너리</button>
                </div>
                <div class="editor-wrap">
                    <div class="line-nums" id="lineNums"><span>1</span></div>
                    <textarea
                        id="editor"
                        spellcheck="false"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        placeholder="◘ 점(Jeom) 코드를 입력하세요&#10;◘ 점 유니코드 문자만 사용 가능합니다&#10;&#10;•·&#10;  ··&#10;⋮⋮"
                    ></textarea>
                </div>
                <div class="statusbar">
                    <div class="s-item">
                        <div class="s-dot" id="sDot"></div>
                        <span id="sTxt">준비</span>
                    </div>
                    <div class="s-item">Ln<span id="sLn">1</span> Col<span id="sCol">1</span></div>
                    <div class="s-item"><span id="sChars">0</span>ch</div>
                    <div class="s-item" style="margin-left: auto; color: var(--text3)">
                        UTF-8 · .jeom · StackVM v1.1.0
                    </div>
                </div>
            </div>

            <div class="out-panel">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('output')">⋮ 출력</div>
                    <div class="tab" onclick="switchTab('encoder')">• 인코더</div>
                    <div class="tab" onclick="switchTab('tokens')">⋅ 토큰표</div>
                </div>
                <div class="panel-body">
                    <div class="pview active" id="output-tab">
                        <div id="output">
                            <span class="o-info"
                                >◘ 점(Jeom) 웹 VM v1.1.0 준비됨 ◘ [● 실행] 또는 Ctrl+Enter 로 실행 ◘ 사이드바 명령 클릭
                                → 에디터에 삽입 ◘ 인코더 탭에서 문자열/숫자 변환 가능
                            </span>
                        </div>
                    </div>
                    <div class="pview" id="encoder-tab">
                        <div class="enc-wrap">
                            <div class="enc-box">
                                <div class="enc-lbl">● 문자열 → 점 인코딩</div>
                                <input
                                    class="enc-in"
                                    id="sEncIn"
                                    placeholder="인코딩할 문자열 (예: Hello)"
                                    oninput="encStr()"
                                />
                                <div class="enc-res" id="sEncOut" onclick="insertEnc('s')" title="클릭 → 에디터 삽입">
                                    <span style="color: var(--text3)">결과</span>
                                </div>
                                <div class="enc-hint">클릭하면 에디터 커서 위치에 삽입됩니다</div>
                            </div>
                            <div class="enc-box">
                                <div class="enc-lbl">• 숫자 → 점 인코딩</div>
                                <input
                                    class="enc-in"
                                    id="nEncIn"
                                    type="number"
                                    placeholder="정수 (예: 42)"
                                    oninput="encNum()"
                                />
                                <div class="enc-res" id="nEncOut" onclick="insertEnc('n')" title="클릭 → 에디터 삽입">
                                    <span style="color: var(--text3)">결과</span>
                                </div>
                            </div>
                            <div class="enc-box">
                                <div class="enc-lbl">⸳ 디코더</div>
                                <input
                                    class="enc-in"
                                    id="decIn"
                                    placeholder="● ... ● 또는 • ... • 붙여넣기"

                        .split(C.BYTE_SEP)
                        .filter(function (b) {

                // ══════════════════════════════════════════════════════════════
                // §5  렉서
                // ══════════════════════════════════════════════════════════════

                            cur = [],
                            bytes = [];

                                raw += adv();
                                break;
                            } else if (ch === C.ZERO) {
                                cur.push(0);
                                raw += adv();
                            } else if (ch === C.ONE) {
                                cur.push(1);
                                raw += adv();

                                }

                            } else

                // §6  파서
                // ══════════════════════════════════════════════════════════════

                            adv();
                            return { type: "STR_LIT", value: t.value };

                            elifs = [],
                            els = null;

                            adv();

                                b = parseBlock();
                            elifs.push({ cond: c, body: b });

                            adv();
                            els = parseBlock();
                        }

                    }

                        var ln = peek().line;
                        adv();
                        return { type: "WHILE", condBody: parseBlock(), body: parseBlock(), line: ln };
                    }
                    function parseTry() {
                        var ln = peek().line;
                        adv();
                        var tb = parseBlock(),
                            cb = null,
                            fb = null;
                        if (opName(peek()) === "CATCH") {
                            adv();
                            cb = parseBlock();
                        }
                        if (opName(peek()) === "FINALLY") {
                            adv();
                            fb = parseBlock();
                        }
                        return { type: "TRY", tryBody: tb, catchBody: cb, finallyBody: fb, line: ln };
                    }
                    function parseMain() {
                        adv();
                        var b = parseBody();
                        if (opName(peek()) === "END") adv();

                    }
                    function parseStmt() {
                        var t = peek(),
                            ln = t.line,
                            op = opName(t);

                            adv();
                            return { type: "PUSH", expr: { type: "NUM_LIT", value: t.value }, line: ln };
                        }

                            adv();
                            return { type: "PUSH", expr: { type: "STR_LIT", value: t.value }, line: ln };

                            case "GET": {
                                adv();
                                return { type: "GETVAR", name: readName(), line: ln };
                            }
                            case "DEL": {
                                adv();
                                return { type: "DELVAR", name: readName(), line: ln };
                            }
                            case "STORE": {
                                adv();
                                return { type: "STORE", name: readName(), line: ln };
                            }
                            case "PUSH_CMD": {
                                adv();
                                return { type: "PUSH", expr: parseVal(), line: ln };
                            }

                                return parseFuncDef();
                            case "LAMBDA":
                                return parseLambda();

                                return { type: "GOTO", name: readName(), line: ln };
                            }

                                adv();
                                return { type: "IMPORT", line: ln };
                            }

                                adv();
                                return { type: "IMPORT", line: ln };
                            }
                            case "EXPORT": {
                                adv();
                                return { type: "EXPORT", name: readName(), line: ln };
                            }
                            case "BLOCK": {
                                adv();
                                var bb = parseBody();
                                if (opName(peek()) === "END") adv();
                                return { type: "BLOCK", body: bb, line: ln };
                            }
                            default:
                                adv();
                                return { type: "INSTR", op: op, line: ln };
                        }
                    }
                    var stmts = [];
                    while (peek().type !== "EOF") {
                        var s = parseStmt();
                        if (s) stmts.push(s);
                    }
                    return stmts;
                }

                // ══════════════════════════════════════════════════════════════
                // §7  VM
                // ══════════════════════════════════════════════════════════════

                function JeomVM(opts) {
                    opts = opts || {};
                    this.stdout = opts.stdout || function () {};
                    this.stderr = opts.stderr || function () {};
                    this.stdin =
                        opts.stdin ||
                        function () {
                            return Promise.resolve("");
                        };
                    this.readFile =
                        opts.readFile ||
                        function () {
                            return Promise.reject(new JeomError("파일읽기 미지원"));
                        };
                    this.writeFile =
                        opts.writeFile ||
                        function () {
                            return Promise.reject(new JeomError("파일쓰기 미지원"));
                        };
                    this.fileExists =
                        opts.fileExists ||
                        function () {
                            return Promise.resolve(false);
                        };
                    this.deleteFile =
                        opts.deleteFile ||
                        function () {
                            return Promise.reject(new JeomError("삭제 미지원"));
                        };
                    this.listDir =
                        opts.listDir ||
                        function () {
                            return Promise.resolve([]);
                        };
                    this.makeDir =
                        opts.makeDir ||
                        function () {
                            return Promise.reject(new JeomError("mkdir 미지원"));
                        };
                    this.execCmd =
                        opts.execCmd ||
                        function () {
                            return Promise.reject(new JeomError("exec 미지원"));
                        };
                    this.getEnv =
                        opts.getEnv ||
                        function () {
                            return "";
                        };
                    this.maxSteps = opts.maxSteps || 2000000;
                    this.maxCallDepth = opts.maxCallDepth || 500;
                    this.maxLoop = opts.maxLoop || 100000;
                    this.stack = [];
                    this.env = {};
                    this.functions = {};
                    this.modules = {};
                    this.callDepth = 0;
                    this.stepCount = 0;
                }

                JeomVM.prototype.run = async function (source) {
                    this.stepCount = 0;
                    var toks = tokenize(source),
                        stmts = parse(toks);
                    for (var i = 0; i < stmts.length; i++) if (stmts[i].type === "FUNCDEF") this._regFunc(stmts[i]);
                    var main = null;
                    for (var j = 0; j < stmts.length; j++)
                        if (stmts[j].type === "MAIN") {
                            main = stmts[j];
                            break;
                        }
                    if (!main) throw new JeomError("main 블록(•·...⋮⋮)이 없습니다");
                    await this._execList(main.body);
                };

                JeomVM.prototype._push = function (v) {
                    this.stack.push(v);
                };
                JeomVM.prototype._pop = function () {
                    if (!this.stack.length) throw new JeomError("스택 언더플로우");
                    return this.stack.pop();
                };
                JeomVM.prototype._peek = function () {
                    if (!this.stack.length) throw new JeomError("스택이 비어있음");
                    return this.stack[this.stack.length - 1];
                };
                JeomVM.prototype._setVar = function (n, v) {
                    this.env[n] = v;
                };
                JeomVM.prototype._getVar = function (n) {
                    if (Object.prototype.hasOwnProperty.call(this.env, n)) return this.env[n];
                    throw new JeomError("정의되지 않은 변수: '" + n + "'");
                };
                JeomVM.prototype._regFunc = function (node) {
                    var fn = { args: node.args, body: node.body, closure: Object.assign({}, this.env), _isFunc: true };
                    this.functions[node.name] = fn;
                    this.env[node.name] = fn;
                };

                JeomVM.prototype._execList = async function (stmts) {
                    var i = 0;
                    while (i < stmts.length) {
                        this.stepCount++;
                        if (this.stepCount > this.maxSteps) throw new JeomError("최대 스텝 초과 — 무한루프?");
                        try {
                            await this._exec(stmts[i]);
                        } catch (e) {
                            if (e && e.name === "JeomGoto") {
                                var found = false;
                                for (var j = 0; j < stmts.length; j++) {
                                    if (stmts[j].type === "LABEL" && stmts[j].name === e.label) {
                                        i = j + 1;
                                        found = true;
                                        break;
                                    }
                                }
                                if (!found) throw e;
                                continue;
                            }
                            throw e;
                        }
                        i++;
                    }
                };

                JeomVM.prototype._exec = async function (node) {
                    if (!node) return;
                    if (Array.isArray(node)) {
                        await this._execList(node);
                        return;
                    }
                    switch (node.type) {
                        case "PUSH":
                            this._push(await this._eval(node.expr));
                            break;
                        case "VARSET":
                            this._setVar(node.name, await this._eval(node.expr));
                            break;
                        case "STORE":
                            this._setVar(node.name, this._pop());
                            break;
                        case "GETVAR":
                            this._push(this._getVar(node.name));
                            break;
                        case "DELVAR":
                            delete this.env[node.name];
                            break;
                        case "FUNCDEF":
                            this._regFunc(node);
                            break;
                        case "LAMBDA": {
                            var cl = Object.assign({}, this.env);
                            this._push({ args: node.args, body: node.body, closure: cl, _isFunc: true });
                            break;
                        }
                        case "CALL":
                            await this._callByName(node.name);
                            break;
                        case "IF":
                            await this._execIf(node);
                            break;
                        case "LOOP":
                            await this._execLoop(node);
                            break;
                        case "WHILE":
                            await this._execWhile(node);
                            break;
                        case "TRY":
                            await this._execTry(node);
                            break;
                        case "THROW":
                            throw new JeomError(String(this._pop()));
                        case "LABEL":
                            break;
                        case "GOTO":
                            throw new JeomGoto(node.name);
                        case "BLOCK":
                            await this._execList(node.body);
                            break;
                        case "MAIN":
                            await this._execList(node.body);
                            break;
                        case "IMPORT":
                            await this._doImport();
                            break;
                        case "EXPORT":
                            break;
                        case "INSTR":
                            await this._execInstr(node.op);
                            break;

                            throw new JeomError("알 수 없는 노드: '" + node.type + "'");
                    }
                };

                JeomVM.prototype._eval = async function (node) {
                    switch (node.type) {
                        case "NUM_LIT":
                            return node.value;
                        case "STR_LIT":
                            return node.value;
                        case "GETVAR":
                            return this._getVar(node.name);
                        case "NAME":
                            return this._getVar(node.raw);
                        default:
                            await this._exec(node);
                            return this._pop();
                    }
                };

                JeomVM.prototype._execIf = async function (node) {
                    var cond = this._pop();
                    if (this._truthy(cond)) {
                        await this._execList(node.thenBody);
                        return;
                    }
                    for (var i = 0; i < node.elifBranches.length; i++) {
                        await this._execList(node.elifBranches[i].cond);
                        if (this._truthy(this._pop())) {
                            await this._execList(node.elifBranches[i].body);
                            return;
                        }
                    }
                    if (node.elseBody) await this._execList(node.elseBody);
                };

                JeomVM.prototype._execLoop = async function (node) {
                    var count = Math.max(0, Math.floor(this._num(this._pop())));
                    for (var i = 0; i < count; i++) {
                        try {
                            await this._execList(node.body);
                        } catch (e) {
                            if (e && e.name === "JeomBreak") break;
                            if (e && e.name === "JeomContinue") continue;
                            throw e;
                        }
                    }
                };

                JeomVM.prototype._execWhile = async function (node) {
                    var guard = 0;
                    while (true) {
                        if (++guard > this.maxLoop) throw new JeomError("WHILE 최대반복 초과");
                        await this._execList(node.condBody);
                        if (!this._truthy(this._pop())) break;
                        try {
                            await this._execList(node.body);
                        } catch (e) {
                            if (e && e.name === "JeomBreak") break;
                            if (e && e.name === "JeomContinue") continue;
                            throw e;
                        }
                    }
                };

                JeomVM.prototype._execTry = async function (node) {
                    try {
                        await this._execList(node.tryBody);
                    } catch (e) {
                        if (
                            e &&
                            (e.name === "JeomBreak" ||
                                e.name === "JeomContinue" ||
                                e.name === "JeomReturn" ||
                                e.name === "JeomExit")
                        )
                            throw e;
                        if (node.catchBody) {
                            this._push(e.message || String(e));
                            await this._execList(node.catchBody);
                        } else throw e;
                    } finally {
                        if (node.finallyBody) await this._execList(node.finallyBody);
                    }
                };

                JeomVM.prototype._callByName = async function (name) {
                    var fn =
                        this.functions[name] ||
                        (Object.prototype.hasOwnProperty.call(this.env, name) ? this.env[name] : null);
                    if (!fn || !fn.args) throw new JeomError("정의되지 않은 함수: '" + name + "'");
                    await this._callFn(fn);
                };

                JeomVM.prototype._callFn = async function (fn) {
                    if (!fn || !fn.args) throw new JeomError("함수 객체 아님");
                    this.callDepth++;
                    if (this.callDepth > this.maxCallDepth) throw new JeomError("최대 재귀깊이 초과");
                    var args = [];
                    for (var i = 0; i < fn.args.length; i++) args.unshift(this._pop());
                    var saved = Object.assign({}, this.env);
                    this.env = Object.assign({}, fn.closure);
                    for (var j = 0; j < fn.args.length; j++) this.env[fn.args[j]] = args[j];
                    try {
                        await this._execList(fn.body);
                    } catch (e) {
                        if (e && e.name === "JeomReturn") {
                            if (e.value !== undefined) this._push(e.value);
                        } else throw e;
                    } finally {
                        this.env = saved;
                        this.callDepth--;
                    }
                };

                JeomVM.prototype._doImport = async function () {
                    var path = String(this._pop());
                    if (this.modules[path]) {
                        Object.assign(this.env, this.modules[path]);
                        Object.assign(this.functions, this.modules[path + ":fn"] || {});
                        return;
                    }
                    var src;
                    try {
                        src = await this.readFile(path);
                    } catch (e) {
                        throw new JeomError("모듈 로드 실패: '" + path + "' — " + e.message);
                    }
                    var sub = new JeomVM({
                        stdout: this.stdout,
                        stderr: this.stderr,
                        stdin: this.stdin,
                        readFile: this.readFile,
                        writeFile: this.writeFile,
                        fileExists: this.fileExists,
                        getEnv: this.getEnv,
                    });
                    var stmts = parse(tokenize(src));
                    for (var i = 0; i < stmts.length; i++) if (stmts[i].type === "FUNCDEF") sub._regFunc(stmts[i]);
                    var main = null;
                    for (var j = 0; j < stmts.length; j++)
                        if (stmts[j].type === "MAIN") {
                            main = stmts[j];
                            break;
                        }
                    if (main) await sub._execList(main.body);
                    this.modules[path] = sub.env;
                    this.modules[path + ":fn"] = sub.functions;
                    Object.assign(this.env, sub.env);
                    Object.assign(this.functions, sub.functions);
                };

                JeomVM.prototype._execInstr = async function (op) {
                    var a, b, v, n, fn, arr, d, k, i, res, parts, fh, r;

                            break;
                        case "PEEK":
                            this._push(this._peek());
                            break;
                        case "SWAP":
                            b = this._pop();
                            a = this._pop();
                            this._push(b);
                            this._push(a);
                            break;
                        case "DUP":
                            this._push(this._peek());
                            break;
                        case "ADD":
                            b = this._pop();
                            a = this._pop();
                            this._push(this._add(a, b));
                            break;
                        case "SUB":
                            b = this._pop();
                            a = this._pop();
                            this._push(this._num(a) - this._num(b));
                            break;
                        case "MUL":
                            b = this._pop();
                            a = this._pop();
                            this._push(this._num(a) * this._num(b));
                            break;
                        case "DIV": {
                            b = this._pop();
                            a = this._pop();
                            if (this._num(b) === 0) throw new JeomError("0으로 나눌 수 없음");
                            this._push(this._num(a) / this._num(b));
                            break;
                        }
                        case "MOD":
                            b = this._pop();
                            a = this._pop();
                            this._push(this._num(a) % this._num(b));
                            break;
                        case "POW":
                            b = this._pop();
                            a = this._pop();
                            this._push(Math.pow(this._num(a), this._num(b)));
                            break;
                        case "AND":
                            b = this._pop();
                            a = this._pop();
                            this._push(this._truthy(a) && this._truthy(b) ? 1 : 0);
                            break;
                        case "OR":
                            b = this._pop();
                            a = this._pop();
                            this._push(this._truthy(a) || this._truthy(b) ? 1 : 0);
                            break;
                        case "NOT":
                            this._push(this._truthy(this._pop()) ? 0 : 1);
                            break;
                        case "XOR":
                            b = this._pop();
                            a = this._pop();
                            this._push(!!this._truthy(a) !== !!this._truthy(b) ? 1 : 0);
                            break;
                        case "EQ":
                            b = this._pop();
                            a = this._pop();
                            this._push(a == b ? 1 : 0);
                            break;
                        case "NEQ":
                            b = this._pop();
                            a = this._pop();
                            this._push(a != b ? 1 : 0);
                            break;
                        case "LT":
                            b = this._pop();
                            a = this._pop();
                            this._push(a < b ? 1 : 0);
                            break;
                        case "GT":
                            b = this._pop();
                            a = this._pop();
                            this._push(a > b ? 1 : 0);
                            break;
                        case "LTE":
                            b = this._pop();
                            a = this._pop();
                            this._push(a <= b ? 1 : 0);

                        case "GTE":

                            a = this._pop();

                    REF_GROUPS.forEach(function (g) {
                        g.items.forEach(function (item) {
                            var tok = item[0],
                                name = item[1];
                            var card = document.createElement("div");
                            card.className = "tok-card";
                            card.innerHTML =
                                '<span class="tc-sym">' + tok + '</span><span class="tc-name">' + name + "</span>";
                            card.addEventListener("click", function () {
                                insertToken(tok);
                                toast(tok + " 삽입됨");
                            });
                            grid.appendChild(card);
                        });
                    });
                }

                // 전역 노출
                window.runCode = runCode;
                window.checkCode = checkCode;
                window.clearOutput = clearOutput;
                window.downloadCode = downloadCode;
                window.openFile = openFile;
                window.submitInput = submitInput;
                window.switchTab = switchTab;
                window.encStr = encStr;
                window.encNum = encNum;
                window.doDecode = doDecode;
                window.insertEnc = insertEnc;
                window.loadEx = loadEx;

                buildSidebar();
                buildTokenGrid();
                loadEx("hello");
                updateLN();
                setStatus("준비");
            })();
        </script>
    </body>
</html>
