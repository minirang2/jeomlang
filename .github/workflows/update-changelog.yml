name: Update CHANGELOG on Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update changelog
        shell: bash
        run: |
          mkdir -p docs
          touch docs/CHANGELOG.md

          RELEASE_DATE=$(date -d "${{ github.event.release.published_at }}" +"%Y-%m-%d")

          {
            echo "## ${{ github.event.release.tag_name }} - ${RELEASE_DATE}"
            echo ""

            printf '%s\n' "${{ github.event.release.body }}"

            echo ""
            echo "---"
            echo ""

            cat docs/CHANGELOG.md
          } > temp.md

          mv temp.md docs/CHANGELOG.md

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(changelog): update for ${{ github.event.release.tag_name }}"

          git pull --rebase origin main
          git push origin HEAD:main
