<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeomlang — 웹 IDE</title>
    <link rel="stylesheet" href="/ide/ide.css" />
    <link rel="icon" href="/assets/img/logo.svg" type="image/svg+xml">
</head>

<body>
    <header>
        <div class="logo">
            <img src="/assets/img/logo.svg" alt="Jeom" title="점(Jeom) Language" />
            <div>
                <div class="logo-text">점 · JEOM</div>
                <div class="logo-sub">Jeom IDE</div>
            </div>
        </div>
        <div class="header-right">
            <span class="badge"><jeom-version></jeom-version></span>
            <span class="badge">WebVM</span>
        </div>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div class="sidebar-title">· 명령 참조</div>
            <div class="ref-list" id="refList"></div>
        </div>

        <div class="editor-area">
            <div class="editor-toolbar">
                <input class="fn-input" id="filename" value="main.jeom" spellcheck="false" />
                <div class="sep"></div>
                <button class="btn primary" onclick="runCode()" title="Ctrl+Enter / F5">
                    <span class="btn-icon">●</span> 실행
                </button>
                <button class="btn" onclick="checkCode()"><span class="btn-icon">∘</span> 검사</button>
                <div class="sep"></div>
                <button class="btn" onclick="downloadCode()"><span class="btn-icon">⸳</span> 저장</button>
                <button class="btn" onclick="document.getElementById('fi').click()">
                    <span class="btn-icon">◦</span> 열기
                </button>
                <input type="file" id="fi" accept=".jeom,.txt" style="display: none" onchange="openFile(event)" />
                <div class="ml-auto">
                    <button class="btn danger" onclick="clearOutput()">
                        <span class="btn-icon">‥</span> 지우기
                    </button>
                </div>
            </div>
            <div class="ex-bar">
                <span class="ex-label">예제 ·</span>
                <button class="ex-btn" onclick="loadEx('hello')">● Hello</button>
                <button class="ex-btn" onclick="loadEx('vars')">∘ 변수·연산</button>
                <button class="ex-btn" onclick="loadEx('func')">˙ 함수</button>
                <button class="ex-btn" onclick="loadEx('loop')">‥ 반복문</button>
                <button class="ex-btn" onclick="loadEx('array')">◦ 배열</button>
                <button class="ex-btn" onclick="loadEx('trycatch')">‥· 오류처리</button>
                <button class="ex-btn" onclick="loadEx('input')">·˙ 입력</button>
                <button class="ex-btn" onclick="loadEx('dict')">◦‧ 딕셔너리</button>
            </div>
            <div class="editor-wrap">
                <div class="line-nums" id="lineNums"><span>1</span></div>
                <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
                    placeholder="◘ 점(Jeom) 코드를 입력하세요&#10;◘ 점 유니코드 문자만 사용 가능합니다&#10;&#10;•·&#10;  ··&#10;⋮⋮"></textarea>
            </div>
            <div class="statusbar">
                <div class="s-item">
                    <div class="s-dot" id="sDot"></div>
                    <span id="sTxt">준비</span>
                </div>
                <div class="s-item">Ln<span id="sLn">1</span> Col<span id="sCol">1</span></div>
                <div class="s-item"><span id="sChars">0</span>ch</div>
                <div class="s-item" style="margin-left: auto; color: var(--text3)">
                    UTF-8 · .jeom · StackVM <jeom-version></jeom-version>
                </div>
            </div>
        </div>

        <div class="out-panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('output')">⋮ 출력</div>
                <div class="tab" onclick="switchTab('encoder')">• 인코더</div>
                <div class="tab" onclick="switchTab('tokens')">⋅ 토큰표</div>
            </div>
            <div class="panel-body">
                <div class="pview active" id="output-tab">
                    <div id="output">
                        <span class="o-info">◘ 점(Jeom) 웹 VM <jeom-version></jeom-version> 준비됨 ◘ [● 실행] 또는 Ctrl+Enter 로 실행 ◘ 사이드바 명령 클릭
                            → 에디터에 삽입 ◘ 인코더 탭에서 문자열/숫자 변환 가능
                        </span>
                    </div>
                </div>
                <div class="pview" id="encoder-tab">
                    <div class="enc-wrap">
                        <div class="enc-box">
                            <div class="enc-lbl">● 문자열 → 점 인코딩</div>
                            <input class="enc-in" id="sEncIn" placeholder="인코딩할 문자열 (예: Hello)" oninput="encStr()" />
                            <div class="enc-res" id="sEncOut" onclick="insertEnc('s')" title="클릭 → 에디터 삽입">
                                <span style="color: var(--text3)">결과</span>
                            </div>
                            <div class="enc-hint">클릭하면 에디터 커서 위치에 삽입됩니다</div>
                        </div>
                        <div class="enc-box">
                            <div class="enc-lbl">• 숫자 → 점 인코딩</div>
                            <input class="enc-in" id="nEncIn" type="number" placeholder="정수 (예: 42)"
                                oninput="encNum()" />
                            <div class="enc-res" id="nEncOut" onclick="insertEnc('n')" title="클릭 → 에디터 삽입">
                                <span style="color: var(--text3)">결과</span>
                            </div>
                        </div>
                        <div class="enc-box">
                            <div class="enc-lbl">• 소수 → 점 인코딩</div>
                            <input class="enc-in" id="fEncIn" type="number" step="any" placeholder="소수 (예: 3.14)"
                                oninput="encFloat()" />
                            <div class="enc-res" id="fEncOut" onclick="insertEnc('f')" title="클릭 → 에디터 삽입">
                                <span style="color: var(--text3)">결과</span>
                            </div>
                        </div>
                        <div class="enc-box">
                            <div class="enc-lbl">⸳ 디코더</div>
                            <input class="enc-in" id="decIn" placeholder="● ... ● 또는 • ... • 붙여넣기"
                                oninput="doDecode()" />
                            <div class="enc-res" id="decOut">
                                <span style="color: var(--text3)">디코딩 결과</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pview" id="tokens-tab">
                    <div class="tok-grid" id="tokGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="inputOv">
        <div class="ov-box">
            <h3>· 입력 대기 중</h3>
            <input type="text" id="inputFld" placeholder="값을 입력하고 Enter" />
            <button class="btn primary" style="width: 100%; justify-content: center" onclick="submitInput()">
                확인 ·
            </button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="/core/engine.js"></script>
    <script src="/ide/dist/ide.js"></script>
    <script src="/shared/custom-elements.js"></script>
</body>

</html>
