name: Actions Bot Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/actions-bot-demo.yml

permissions:
  contents: write

concurrency:
  group: actions-bot-demo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commit-as-actions-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Sync branch
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Update demo log
        run: |
          {
            echo "# GitHub Actions Bot Demo"
            echo
            echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Commit source: github-actions[bot]"
            echo "Triggered by: ${{ github.actor }}"
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Branch: ${{ github.ref_name }}"
          } > ACTIONS_BOT_DEMO.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ACTIONS_BOT_DEMO.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update actions bot demo log"
          git push origin "HEAD:${GITHUB_REF_NAME}"
